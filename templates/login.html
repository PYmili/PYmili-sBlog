<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login/css/style.css') }}">
</head>
<body>
    <div class="content">
        <div class="login-wrapper">
            <div class="left-img">
                <div class="glass">
                    <div class="tips">
                        <div class="title">
                            {{ RandomSentenceData['origin'] }}
                        </div>
                        <h1>{{ RandomSentenceData['content'] }}</h1>
                        <!--<span></span>-->
                        <span>
                            ————{{ RandomSentenceData['name'] }}|{{ RandomSentenceData['tag'] }}
                        </span>
                    </div>
                </div>
            </div>
            <div class="right-login-form">
                <div class="form-wrapper">
                    <h1>Log in</h1>
                    <div class="input-items">
                        <span class="input-tips">
                            邮件地址
                        </span>
                        <input type="text" class="inputs" placeholder="输入您的邮件">
                    </div>
                    <div class="input-items">
                        <span class="input-tips">
                            密码
                        </span>
                        <input type="password" class="inputs" placeholder="输入您的密码">
                        <span class="forgot">忘记密码</span>
                    </div>
                    <button class="btn">登录</button>
                    <div class="siginup-tips">
                        <span>没有帐户？</span>
                        <span>注册</span>
                    </div>
                    <div class="other-login">
                        <div class="divider">
                            <span class="line"></span>
                            <span class="divider-text">or</span>
                            <span class="line"></span>
                        </div>
                        <div class="other-login-wrapper">
                            <div class="other-login-item">
                                <img src="{{ url_for('static', filename='login/img/QQ.Png') }}" alt="QQ">
                            </div>
                            <div class="other-login-item">
                                <img src="{{ url_for('static', filename='login/img/WeChat.png') }}" alt="WeChat">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
